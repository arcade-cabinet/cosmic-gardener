<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <title>Cosmic Gardener — social preview</title>

  <!-- Backdrop — violet-deep-space gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120530" />
      <stop offset="55%" stop-color="#08021a" />
      <stop offset="100%" stop-color="#050115" />
    </linearGradient>
    <radialGradient id="nebulaA" cx="30%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2a1247" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#120530" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="nebulaB" cx="72%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#3a2358" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#08021a" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#nebulaA)" />
  <rect width="1200" height="630" fill="url(#nebulaB)" />

  <!-- Scattered stars -->
  <g fill="#d9f2ec" opacity="0.8">
    <circle cx="80"   cy="80"  r="1.2" />
    <circle cx="220"  cy="140" r="1.4" />
    <circle cx="340"  cy="70"  r="1.0" />
    <circle cx="480"  cy="110" r="1.6" />
    <circle cx="620"  cy="80"  r="1.1" />
    <circle cx="780"  cy="150" r="1.3" />
    <circle cx="940"  cy="70"  r="1.4" />
    <circle cx="1080" cy="160" r="1.2" />
    <circle cx="140"  cy="500" r="1.3" />
    <circle cx="290"  cy="560" r="1.1" />
    <circle cx="460"  cy="520" r="1.5" />
    <circle cx="650"  cy="580" r="1.2" />
    <circle cx="830"  cy="520" r="1.4" />
    <circle cx="1000" cy="560" r="1.3" />
  </g>

  <!-- Amber constellation stars -->
  <g fill="#f2c14e" opacity="0.9">
    <circle cx="200" cy="250" r="3" />
    <circle cx="360" cy="350" r="3.5" />
    <circle cx="540" cy="220" r="3" />
    <circle cx="1000" cy="280" r="3.5" />
    <circle cx="1080" cy="450" r="3" />
  </g>

  <!-- Central orb — glowing, with halo -->
  <g transform="translate(850, 355)">
    <circle r="140" fill="#94f1b3" opacity="0.06" />
    <circle r="90"  fill="#94f1b3" opacity="0.12" />
    <circle r="60"  fill="#d9f2ec" opacity="0.85" />
    <circle cx="-12" cy="-18" r="60" fill="#94f1b3" opacity="0.4" />
  </g>

  <!-- Title -->
  <text
    x="80"
    y="300"
    font-family="Fraunces, 'Palatino Linotype', Palatino, serif"
    font-weight="500"
    font-size="98"
    fill="#94f1b3"
  >
    Cosmic Gardener
  </text>

  <!-- Tagline -->
  <text
    x="80"
    y="365"
    font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="30"
    fill="#e7dcf5"
    opacity="0.88"
  >
    Tend living constellations. Escalate into patterns that hum.
  </text>
  <text
    x="80"
    y="405"
    font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="30"
    fill="#e7dcf5"
    opacity="0.88"
  >
    Finish not in victory but in rest.
  </text>

  <!-- URL footer -->
  <text
    x="80"
    y="560"
    font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif"
    font-size="22"
    fill="#9788a8"
    letter-spacing="2"
  >
    arcade-cabinet.github.io/cosmic-gardener
  </text>
</svg>
